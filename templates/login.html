<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login?Signup Form</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <!-- Login form -->
        <div class="form-box login">
            <form action="/login" method="post">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forget-link">
                    <a href="#">Forgot Password</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>Or login with Social Platform</p>
                <div class="social-icons">
    <a href="/auth/google" title="Login with Google"><i class="fa-brands fa-google"></i></a>
    <a href="/auth/github" title="Login with GitHub"><i class="fa-brands fa-github"></i></a>
    <a href="/auth/linkedin" title="Login with LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
</div>
                {% if message %}
                    <p style="color:red; text-align:center;">{{ message }}</p>
                {% endif %}
            </form>
        </div>

        <!-- Register form -->
        <div class="form-box register">
            <form action="/register" method="post">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" name="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>Or register with Social Platform</p>
              <div class="social-icons">
    <a href="/auth/google" title="Register with Google"><i class="fa-brands fa-google"></i></a>
    <a href="/auth/github" title="Register with GitHub"><i class="fa-brands fa-github"></i></a>
    <a href="/auth/linkedin" title="Register with LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
</div>

            </form>
        </div>

        <!-- Toggle Box -->
        <div class="toggle-box"></div>

        <!-- Toggle Box Left -->
        <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome!</h1>
            <p>Don't have an account?</p>
            <button class="btn register-btn">Register</button>
        </div>

        <!-- Toggle Box Right -->
        <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn">Login</button>
        </div>
    </div>

</body>
<script src="../static/js/script.js"></script>

</html>
